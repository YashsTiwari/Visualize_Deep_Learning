<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Why RNN Was Needed</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f7fb;
        padding: 20px;
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      .controls {
        text-align: center;
        margin-bottom: 20px;
      }

      button {
        padding: 12px 18px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        background: #1565c0;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      .scene {
        position: relative;

        height: 800px;

        background: white;

        border-radius: 20px;

        overflow: hidden;

        box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
      }

      #message {
        position: absolute;

        top: 20px;

        width: 100%;

        text-align: center;

        font-size: 28px;

        font-weight: bold;

        z-index: 1000;
      }

      /* =====================
TEACHER
===================== */

      #teacher {
        position: absolute;

        left: 80px;

        top: 250px;

        font-size: 120px;

        display: none;
      }

      #teacherLabel {
        position: absolute;

        left: 90px;

        top: 390px;

        font-size: 24px;

        font-weight: bold;

        display: none;
      }

      /* =====================
STORY CARDS
===================== */

      .storyCard {
        position: absolute;

        left: -500px;

        width: 420px;

        padding: 20px;

        background: white;

        border-radius: 15px;

        box-shadow: 0 0 15px rgba(0, 0, 0, 0.15);

        font-size: 28px;

        font-weight: bold;

        transition: all 1.5s;
      }

      #card1 {
        top: 180px;

        display: none;
      }

      #card2 {
        top: 320px;

        display: none;
      }

      #card3 {
        top: 460px;

        display: none;
      }

      /* =====================
QUESTION
===================== */

      #questionBox {
        position: absolute;

        left: 50%;

        top: 120px;

        transform: translateX(-50%);

        padding: 20px 40px;

        background: #fff8e1;

        border: 3px solid orange;

        border-radius: 15px;

        font-size: 34px;

        font-weight: bold;

        display: none;
      }

      /* =====================
FCNN
===================== */

      #fcnn {
        position: absolute;

        right: 120px;

        top: 240px;

        font-size: 120px;

        display: none;
      }

      #fcnnLabel {
        position: absolute;

        right: 120px;

        top: 390px;

        font-size: 24px;

        font-weight: bold;

        display: none;
      }

      #fcnnBubble {
        position: absolute;

        right: 240px;

        top: 180px;

        padding: 20px;

        background: #ffebee;

        border: 2px solid red;

        border-radius: 15px;

        font-size: 24px;

        display: none;
      }

      /* =====================
HUMAN
===================== */

      #human {
        position: absolute;

        left: 120px;

        top: 260px;

        font-size: 120px;

        display: none;
      }

      #humanLabel {
        position: absolute;

        left: 135px;

        top: 410px;

        font-size: 24px;

        font-weight: bold;

        display: none;
      }

      /* =====================
MEMORY BOX
===================== */

      #memoryBox {
        position: absolute;

        left: 420px;

        top: 220px;

        width: 260px;

        height: 180px;

        background: #e8f5e9;

        border: 4px solid green;

        border-radius: 20px;

        display: none;

        font-size: 34px;

        font-weight: bold;

        text-align: center;

        padding-top: 55px;
      }

      /* =====================
MEMORY CARDS
===================== */

      .memoryCard {
        position: absolute;

        width: 180px;

        padding: 15px;

        background: white;

        border-radius: 12px;

        box-shadow: 0 0 12px rgba(0, 0, 0, 0.15);

        font-size: 24px;

        font-weight: bold;

        text-align: center;

        display: none;

        transition: all 1.5s;
      }

      #memory1 {
        left: 750px;

        top: 180px;
      }

      #memory2 {
        left: 750px;

        top: 320px;
      }

      #memory3 {
        left: 750px;

        top: 460px;
      }

      /* =====================
ANSWER
===================== */

      #answerBox {
        position: absolute;

        left: 50%;

        bottom: 80px;

        transform: translateX(-50%);

        padding: 20px 40px;

        background: #e8f5e9;

        border: 3px solid green;

        border-radius: 15px;

        font-size: 34px;

        font-weight: bold;

        display: none;
      }

      /* =====================
RNN COMPARE
===================== */

      #rnnCompare {
        position: absolute;

        left: 50%;

        top: 50%;

        transform: translate(-50%, -50%);

        display: none;

        gap: 100px;
      }

      .compareBox {
        width: 320px;

        padding: 30px;

        background: white;

        border-radius: 20px;

        box-shadow: 0 0 15px rgba(0, 0, 0, 0.15);

        font-size: 32px;

        font-weight: bold;

        text-align: center;
      }

      /* =====================
FINAL CARD
===================== */

      #finalCard {
        position: absolute;

        left: 50%;

        top: 50%;

        transform: translate(-50%, -50%);

        width: 700px;

        padding: 40px;

        background: white;

        border-radius: 20px;

        box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);

        font-size: 30px;

        line-height: 2;

        text-align: center;

        display: none;
      }

      /* =====================
HELPERS
===================== */

      .shake {
        animation: shake 0.4s infinite;
      }

      @keyframes shake {
        0% {
          transform: translateX(-5px);
        }

        50% {
          transform: translateX(5px);
        }

        100% {
          transform: translateX(-5px);
        }
      }

      .glow {
        box-shadow:
          0 0 20px gold,
          0 0 40px gold;
      }

      .fade {
        opacity: 0.15;
      }

      .correct {
        background: #e8f5e9 !important;
        border: 3px solid green !important;
      }

      .wrong {
        background: #ffebee !important;
        border: 3px solid red !important;
      }
    </style>
  </head>

  <body>
    <h1>🧠 Why Was RNN Invented?</h1>

    <div class="controls">
      <button onclick="step1()">1️⃣ Teacher Story</button>

      <button onclick="step2()">2️⃣ Question Time</button>

      <button onclick="step3()">3️⃣ FCNN Fails</button>

      <button onclick="step4()">4️⃣ Human Uses Memory</button>

      <button onclick="step5()">5️⃣ Why RNN?</button>

      <button onclick="step6()">6️⃣ Final Lesson</button>
    </div>

    <div class="scene">
      <div id="message">Press Step 1</div>

      <!-- TEACHER -->

      <div id="teacher">👩‍🏫</div>

      <div id="teacherLabel">Teacher</div>

      <!-- STORY CARDS -->

      <div id="card1" class="storyCard">👦 Rahul scored 95 marks.</div>

      <div id="card2" class="storyCard">🏆 He won the prize.</div>

      <div id="card3" class="storyCard">😊 He was happy.</div>

      <!-- QUESTION -->

      <div id="questionBox">❓ Who was happy?</div>

      <!-- FCNN -->

      <div id="fcnn">🤖</div>

      <div id="fcnnLabel">FCNN</div>

      <div id="fcnnBubble">Who is happy? 🤔</div>

      <!-- HUMAN -->

      <div id="human">🧑</div>

      <div id="humanLabel">Human</div>

      <!-- MEMORY BOX -->

      <div id="memoryBox">🧠 Memory</div>

      <!-- MEMORY CARDS -->

      <div id="memory1" class="memoryCard">👦 Rahul</div>

      <div id="memory2" class="memoryCard">🏆 Prize</div>

      <div id="memory3" class="memoryCard">😊 Happy</div>

      <!-- ANSWER -->

      <div id="answerBox">✅ Rahul was happy!</div>

      <!-- RNN -->

      <div id="rnnCompare">
        <div class="compareBox">
          🤖 FCNN

          <br /><br />

          ❌ No Memory
        </div>

        <div class="compareBox">
          🔄 RNN

          <br /><br />

          ✅ Has Memory
        </div>
      </div>

      <!-- FINAL -->

      <div id="finalCard"></div>
    </div>

    <script>
      const msg = document.getElementById("message");

      function resetScene() {
        document.getElementById("teacher").style.display = "none";
        document.getElementById("teacherLabel").style.display = "none";

        document.getElementById("card1").style.display = "none";
        document.getElementById("card2").style.display = "none";
        document.getElementById("card3").style.display = "none";

        document.getElementById("questionBox").style.display = "none";

        document.getElementById("fcnn").style.display = "none";
        document.getElementById("fcnnLabel").style.display = "none";
        document.getElementById("fcnnBubble").style.display = "none";

        document.getElementById("human").style.display = "none";
        document.getElementById("humanLabel").style.display = "none";

        document.getElementById("memoryBox").style.display = "none";

        document.getElementById("memory1").style.display = "none";
        document.getElementById("memory2").style.display = "none";
        document.getElementById("memory3").style.display = "none";

        document.getElementById("answerBox").style.display = "none";

        document.getElementById("rnnCompare").style.display = "none";

        document.getElementById("finalCard").style.display = "none";

        document.getElementById("fcnn").classList.remove("shake");

        document.getElementById("card1").style.left = "-500px";
        document.getElementById("card2").style.left = "-500px";
        document.getElementById("card3").style.left = "-500px";

        document.getElementById("card1").style.opacity = "1";
        document.getElementById("card2").style.opacity = "1";
        document.getElementById("card3").style.opacity = "1";

        document.getElementById("memory1").style.left = "750px";
        document.getElementById("memory1").style.top = "180px";

        document.getElementById("memory2").style.left = "750px";
        document.getElementById("memory2").style.top = "320px";

        document.getElementById("memory3").style.left = "750px";
        document.getElementById("memory3").style.top = "460px";
      }

      /* ==================================
STEP 1
TEACHER STORY
================================== */

      function step1() {
        resetScene();

        msg.innerHTML = "Teacher tells a story...";

        document.getElementById("teacher").style.display = "block";
        document.getElementById("teacherLabel").style.display = "block";

        document.getElementById("card1").style.display = "block";
        document.getElementById("card2").style.display = "block";
        document.getElementById("card3").style.display = "block";

        setTimeout(() => {
          document.getElementById("card1").style.left = "280px";
        }, 500);

        setTimeout(() => {
          document.getElementById("card2").style.left = "280px";
        }, 2000);

        setTimeout(() => {
          document.getElementById("card3").style.left = "280px";
        }, 3500);

        setTimeout(() => {
          msg.innerHTML = "Rahul scored 95. He won the prize. He was happy.";
        }, 5000);
      }

      /* ==================================
STEP 2
QUESTION
================================== */

      function step2() {
        resetScene();

        document.getElementById("teacher").style.display = "block";
        document.getElementById("teacherLabel").style.display = "block";

        document.getElementById("card1").style.display = "block";
        document.getElementById("card2").style.display = "block";
        document.getElementById("card3").style.display = "block";

        document.getElementById("card1").style.left = "280px";
        document.getElementById("card2").style.left = "280px";
        document.getElementById("card3").style.left = "280px";

        document.getElementById("questionBox").style.display = "block";

        msg.innerHTML = "Question Time!";
      }

      /* ==================================
STEP 3
FCNN FAILS
================================== */

      function step3() {
        resetScene();

        document.getElementById("fcnn").style.display = "block";
        document.getElementById("fcnnLabel").style.display = "block";

        document.getElementById("card1").style.display = "block";
        document.getElementById("card2").style.display = "block";
        document.getElementById("card3").style.display = "block";

        document.getElementById("card1").style.left = "280px";
        document.getElementById("card2").style.left = "280px";
        document.getElementById("card3").style.left = "280px";

        document.getElementById("questionBox").style.display = "block";

        msg.innerHTML = "FCNN tries to answer...";

        setTimeout(() => {
          document.getElementById("card1").style.opacity = "0";

          msg.innerHTML = "FCNN forgets: Rahul scored 95";
        }, 1500);

        setTimeout(() => {
          document.getElementById("card2").style.opacity = "0";

          msg.innerHTML = "FCNN forgets: He won the prize";
        }, 3500);

        setTimeout(() => {
          document.getElementById("card3").innerHTML = "😊 Happy";
        }, 5000);

        setTimeout(() => {
          document.getElementById("fcnn").classList.add("shake");

          document.getElementById("fcnnBubble").style.display = "block";

          msg.innerHTML = "FCNN only sees 'happy'";
        }, 6500);

        setTimeout(() => {
          msg.innerHTML = "Who is happy? FCNN doesn't know.";
        }, 8500);
      }

      /* ==================================
STEP 4
HUMAN MEMORY
================================== */

      function step4() {
        resetScene();

        document.getElementById("human").style.display = "block";
        document.getElementById("humanLabel").style.display = "block";

        document.getElementById("memoryBox").style.display = "block";

        document.getElementById("memory1").style.display = "block";
        document.getElementById("memory2").style.display = "block";
        document.getElementById("memory3").style.display = "block";

        msg.innerHTML = "Humans store information in memory.";

        setTimeout(() => {
          document.getElementById("memory1").style.left = "470px";
          document.getElementById("memory1").style.top = "240px";
        }, 1000);

        setTimeout(() => {
          document.getElementById("memory2").style.left = "470px";
          document.getElementById("memory2").style.top = "240px";
        }, 2500);

        setTimeout(() => {
          document.getElementById("memory3").style.left = "470px";
          document.getElementById("memory3").style.top = "240px";
        }, 4000);

        setTimeout(() => {
          msg.innerHTML = "All information is stored.";
        }, 5500);

        setTimeout(() => {
          document.getElementById("memory1").style.left = "720px";
          document.getElementById("memory1").style.top = "240px";

          document.getElementById("memory1").classList.add("glow");

          msg.innerHTML = "Human remembers Rahul.";
        }, 7000);

        setTimeout(() => {
          document.getElementById("answerBox").style.display = "block";
        }, 8500);
      }

      /* ==================================
STEP 5
WHY RNN
================================== */

      function step5() {
        resetScene();

        document.getElementById("rnnCompare").style.display = "flex";

        msg.innerHTML = "Language needs memory.";
      }

      /* ==================================
STEP 6
FINAL LESSON
================================== */

      function step6() {
        resetScene();

        document.getElementById("finalCard").style.display = "block";

        document.getElementById("finalCard").innerHTML = `

<h2>🧠 Why Was RNN Invented?</h2>

<br>

Teacher asked:

<br><br>

❓ Who was happy?

<br><br>

🤖 FCNN

<br>

❌ Forgot earlier words

<br><br>

🧑 Human

<br>

✅ Remembered Rahul

<br><br>

🔄 RNN

<br>

✅ Designed to remember
previous information

<br><br>

Language needs memory.

`;

        msg.innerHTML =
          "RNN was created because language depends on previous words.";
      }
    </script>
  </body>
</html>
