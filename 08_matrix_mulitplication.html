<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Matrix Multiplication Intuition</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f7fb;
        padding: 40px;
        color: #222;
      }

      .main-title {
        text-align: center;
        font-size: 54px;
        margin-bottom: 50px;
      }

      .section {
        background: white;
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      .section-title {
        text-align: center;
        font-size: 40px;
        margin-bottom: 20px;
      }

      .subtitle {
        text-align: center;
        font-size: 26px;
        color: #555;
        margin-bottom: 40px;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 40px;
      }

      button {
        padding: 16px 28px;
        border: none;
        border-radius: 14px;
        font-size: 22px;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
      }

      .blue {
        background: #1565c0;
      }

      .green {
        background: #2e7d32;
      }

      .orange {
        background: #ef6c00;
      }

      .red {
        background: #c62828;
      }

      .demo-area {
        min-height: 950px;
        border-radius: 24px;
        background: #fafafa;
        padding: 40px;
      }

      .matrix-layout {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 80px;
        margin-top: 40px;
      }

      .matrix-container {
        text-align: center;
      }

      .matrix-label {
        font-size: 30px;
        font-weight: bold;
        margin-bottom: 25px;
      }

      .matrix {
        display: grid;
        gap: 12px;
        justify-content: center;
      }

      .matrix-2x2 {
        grid-template-columns: repeat(2, 90px);
      }

      .box {
        width: 90px;
        height: 90px;
        border-radius: 16px;
        border: 4px solid #222;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 34px;
        font-weight: bold;
        transition: 1s;
      }

      .result-cell {
        width: 120px;
        height: 120px;
        border-radius: 18px;
        border: 5px dashed #666;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 38px;
        font-weight: bold;
        transition: 1s;
      }

      .red-box {
        background: #ffcdd2;
        border-color: #c62828;
      }

      .blue-box {
        background: #bbdefb;
        border-color: #1565c0;
      }

      .green-box {
        background: #c8e6c9;
        border-color: #2e7d32;
      }

      .orange-box {
        background: #ffe0b2;
        border-color: #ef6c00;
      }

      .purple-box {
        background: #e1bee7;
        border-color: #8e24aa;
      }

      .highlight {
        transform: scale(1.12);
        box-shadow: 0 0 25px #ff9800;
      }

      .info {
        text-align: center;
        margin-top: 20px;
        font-size: 24px;
        color: #555;
      }

      .operation {
        text-align: center;
        margin-top: 50px;
        font-size: 34px;
        font-weight: bold;
        min-height: 60px;
      }

      .step-label {
        text-align: center;
        font-size: 30px;
        font-weight: bold;
        margin-top: 30px;
        color: #1565c0;
      }

      .message {
        margin-top: 40px;
        text-align: center;
        font-size: 30px;
        font-weight: bold;
        min-height: 50px;
      }

      .code {
        margin-top: 40px;
        background: #1e1e1e;
        color: #00ff99;
        padding: 24px;
        border-radius: 18px;
        font-size: 24px;
        line-height: 1.8;
        overflow-x: auto;
      }
    </style>
  </head>

  <body>
    <div class="main-title">🧠 Matrix Multiplication Visualization</div>

    <div class="section">
      <div class="section-title">Rows Interact With Columns</div>

      <div class="subtitle">One output cell at a time</div>

      <div class="controls">
        <button class="blue" onclick="loadExample1()">Load Example 1</button>

        <button class="green" onclick="loadExample2()">Load Example 2</button>

        <button class="orange" onclick="nextStep()">Next Step</button>

        <button class="red" onclick="resetDemo()">Reset</button>
      </div>

      <div class="demo-area">
        <div class="matrix-layout">
          <!-- MATRIX A -->

          <div class="matrix-container">
            <div class="matrix-label">Matrix A</div>

            <div class="matrix matrix-2x2">
              <div class="box red-box" id="a1">1</div>
              <div class="box red-box" id="a2">2</div>

              <div class="box blue-box" id="a3">3</div>
              <div class="box blue-box" id="a4">4</div>
            </div>

            <div class="info">2 × 2</div>
          </div>

          <div style="font-size: 80px; margin-top: 80px">×</div>

          <!-- MATRIX B -->

          <div class="matrix-container">
            <div class="matrix-label">Matrix B</div>

            <div class="matrix matrix-2x2">
              <div class="box green-box" id="b1">5</div>
              <div class="box orange-box" id="b2">6</div>

              <div class="box green-box" id="b3">7</div>
              <div class="box orange-box" id="b4">8</div>
            </div>

            <div class="info">2 × 2</div>
          </div>

          <div style="font-size: 80px; margin-top: 80px">=</div>

          <!-- RESULT -->

          <div class="matrix-container">
            <div class="matrix-label">Result Matrix</div>

            <div class="matrix matrix-2x2">
              <div class="result-cell" id="r1">?</div>
              <div class="result-cell" id="r2">?</div>

              <div class="result-cell" id="r3">?</div>
              <div class="result-cell" id="r4">?</div>
            </div>

            <div class="info">2 × 2</div>
          </div>
        </div>

        <div class="step-label" id="stepLabel">Currently Computing: -</div>

        <div class="operation" id="operationText">Load an example first</div>
      </div>

      <div class="message" id="mainMessage">
        Each output cell is one row × one column
      </div>

      <div class="code" id="codeBlock">C[0][0] = (1×5) + (2×7)</div>
    </div>

    <script>
      let currentStep = 0;
      let currentExample = 1;

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function removeHighlights() {
        let boxes = document.querySelectorAll(".box, .result-cell");

        boxes.forEach((box) => {
          box.classList.remove("highlight");
        });
      }

      function resetResults() {
        document.getElementById("r1").innerHTML = "?";
        document.getElementById("r2").innerHTML = "?";
        document.getElementById("r3").innerHTML = "?";
        document.getElementById("r4").innerHTML = "?";
      }

      function resetDemo() {
        currentStep = 0;

        removeHighlights();

        resetResults();

        document.getElementById("stepLabel").innerHTML =
          "Currently Computing: -";

        document.getElementById("operationText").innerHTML =
          "Load an example first";

        document.getElementById("mainMessage").innerHTML =
          "Each output cell is one row × one column";
      }

      function loadExample1() {
        currentExample = 1;
        currentStep = 0;

        resetResults();

        document.getElementById("a1").innerHTML = "1";
        document.getElementById("a2").innerHTML = "2";
        document.getElementById("a3").innerHTML = "3";
        document.getElementById("a4").innerHTML = "4";

        document.getElementById("b1").innerHTML = "5";
        document.getElementById("b2").innerHTML = "6";
        document.getElementById("b3").innerHTML = "7";
        document.getElementById("b4").innerHTML = "8";

        document.getElementById("a1").className = "box red-box";
        document.getElementById("a2").className = "box red-box";
        document.getElementById("a3").className = "box blue-box";
        document.getElementById("a4").className = "box blue-box";

        document.getElementById("b1").className = "box green-box";
        document.getElementById("b2").className = "box orange-box";
        document.getElementById("b3").className = "box green-box";
        document.getElementById("b4").className = "box orange-box";

        document.getElementById("mainMessage").innerHTML = "Example 1 loaded";

        document.getElementById("codeBlock").innerHTML = `A = [
 [1,2],
 [3,4]
]

B = [
 [5,6],
 [7,8]
]`;
      }

      function loadExample2() {
        currentExample = 2;
        currentStep = 0;

        resetResults();

        document.getElementById("a1").innerHTML = "2";
        document.getElementById("a2").innerHTML = "1";
        document.getElementById("a3").innerHTML = "4";
        document.getElementById("a4").innerHTML = "3";

        document.getElementById("b1").innerHTML = "1";
        document.getElementById("b2").innerHTML = "2";
        document.getElementById("b3").innerHTML = "5";
        document.getElementById("b4").innerHTML = "6";

        document.getElementById("a1").className = "box purple-box";
        document.getElementById("a2").className = "box purple-box";
        document.getElementById("a3").className = "box orange-box";
        document.getElementById("a4").className = "box orange-box";

        document.getElementById("b1").className = "box blue-box";
        document.getElementById("b2").className = "box green-box";
        document.getElementById("b3").className = "box blue-box";
        document.getElementById("b4").className = "box green-box";

        document.getElementById("mainMessage").innerHTML = "Example 2 loaded";

        document.getElementById("codeBlock").innerHTML = `A = [
 [2,1],
 [4,3]
]

B = [
 [1,2],
 [5,6]
]`;
      }

      function computeStep(
        aFirst,
        aSecond,
        bFirst,
        bSecond,
        resultId,
        label,
        step1,
        step2,
        finalEquation,
        answer,
      ) {
        removeHighlights();

        document.getElementById("stepLabel").innerHTML =
          "Currently Computing: " + label;

        let af = document.getElementById(aFirst);

        let as = document.getElementById(aSecond);

        let bf = document.getElementById(bFirst);

        let bs = document.getElementById(bSecond);

        let result = document.getElementById(resultId);

        af.classList.add("highlight");
        bf.classList.add("highlight");

        document.getElementById("operationText").innerHTML = step1;

        setTimeout(() => {
          as.classList.add("highlight");
          bs.classList.add("highlight");

          document.getElementById("operationText").innerHTML = step2;
        }, 2000);

        setTimeout(() => {
          result.innerHTML = answer;

          result.classList.add("highlight");

          document.getElementById("operationText").innerHTML = finalEquation;
        }, 4000);

        setTimeout(() => {
          document.getElementById("mainMessage").innerHTML =
            label + " completed";
        }, 5500);
      }

      function nextStep() {
        currentStep++;

        if (currentExample === 1) {
          if (currentStep === 1) {
            computeStep(
              "a1",
              "a2",
              "b1",
              "b3",
              "r1",
              "C[0][0]",
              "1 × 5 = 5",
              "2 × 7 = 14",
              "5 + 14 = 19",
              "19",
            );
          } else if (currentStep === 2) {
            computeStep(
              "a1",
              "a2",
              "b2",
              "b4",
              "r2",
              "C[0][1]",
              "1 × 6 = 6",
              "2 × 8 = 16",
              "6 + 16 = 22",
              "22",
            );
          } else if (currentStep === 3) {
            computeStep(
              "a3",
              "a4",
              "b1",
              "b3",
              "r3",
              "C[1][0]",
              "3 × 5 = 15",
              "4 × 7 = 28",
              "15 + 28 = 43",
              "43",
            );
          } else if (currentStep === 4) {
            computeStep(
              "a3",
              "a4",
              "b2",
              "b4",
              "r4",
              "C[1][1]",
              "3 × 6 = 18",
              "4 × 8 = 32",
              "18 + 32 = 50",
              "50",
            );
          }
        } else {
          if (currentStep === 1) {
            computeStep(
              "a1",
              "a2",
              "b1",
              "b3",
              "r1",
              "C[0][0]",
              "2 × 1 = 2",
              "1 × 5 = 5",
              "2 + 5 = 7",
              "7",
            );
          } else if (currentStep === 2) {
            computeStep(
              "a1",
              "a2",
              "b2",
              "b4",
              "r2",
              "C[0][1]",
              "2 × 2 = 4",
              "1 × 6 = 6",
              "4 + 6 = 10",
              "10",
            );
          } else if (currentStep === 3) {
            computeStep(
              "a3",
              "a4",
              "b1",
              "b3",
              "r3",
              "C[1][0]",
              "4 × 1 = 4",
              "3 × 5 = 15",
              "4 + 15 = 19",
              "19",
            );
          } else if (currentStep === 4) {
            computeStep(
              "a3",
              "a4",
              "b2",
              "b4",
              "r4",
              "C[1][1]",
              "4 × 2 = 8",
              "3 × 6 = 18",
              "8 + 18 = 26",
              "26",
            );
          }
        }
      }
    </script>
  </body>
</html>
